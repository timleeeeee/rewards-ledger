limit_req_zone $binary_remote_addr zone=write_limit:10m rate=30r/m;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 128k;
  client_body_timeout 10s;
  keepalive_timeout 20s;
  send_timeout 15s;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;

  # Write endpoints are proxied with a server-side API key and throttled per IP.
  location ~ ^/api/(transfer|accounts/[^/]+/(earn|spend|reversal))$ {
    limit_req zone=write_limit burst=20 nodelay;

    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://app:${BACKEND_UPSTREAM_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-API-Key "${UPSTREAM_API_KEY}";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /api/ {
    proxy_pass http://app:${BACKEND_UPSTREAM_PORT}/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-API-Key "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location / {
    try_files $uri /index.html;
  }
}
