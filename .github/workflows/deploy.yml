name: Deploy To VM

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Add VM host to known_hosts
        run: |
          PORT="${VM_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.VM_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project files to VM
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gradle' \
            --exclude 'build' \
            --exclude '.idea' \
            --exclude '.vscode' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            ./ "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}:${{ secrets.VM_APP_DIR }}/"

      - name: Write deployment .env on VM
        run: |
          PORT="${VM_SSH_PORT:-22}"
          ssh -p "$PORT" "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}" << 'EOF'
          set -euo pipefail
          mkdir -p "${{ secrets.VM_APP_DIR }}"
          cat > "${{ secrets.VM_APP_DIR }}/.env" << EOT
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          API_KEY=${{ secrets.API_KEY }}
          AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
          AUTH_JWT_ACCESS_MINUTES=${{ secrets.AUTH_JWT_ACCESS_MINUTES }}
          AUTH_JWT_REFRESH_DAYS=${{ secrets.AUTH_JWT_REFRESH_DAYS }}
          RATE_LIMIT_LOGIN_PER_MINUTE=${{ secrets.RATE_LIMIT_LOGIN_PER_MINUTE }}
          RATE_LIMIT_REGISTER_PER_MINUTE=${{ secrets.RATE_LIMIT_REGISTER_PER_MINUTE }}
          RATE_LIMIT_REFRESH_PER_MINUTE=${{ secrets.RATE_LIMIT_REFRESH_PER_MINUTE }}
          RATE_LIMIT_WRITE_PER_MINUTE=${{ secrets.RATE_LIMIT_WRITE_PER_MINUTE }}
          SERVER_PORT=${{ secrets.SERVER_PORT }}
          APP_VERSION=${{ github.sha }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          FRONTEND_API_BASE_URL=${{ secrets.FRONTEND_API_BASE_URL }}
          EOT
          EOF

      - name: Execute remote deploy
        run: |
          PORT="${VM_SSH_PORT:-22}"
          ssh -p "$PORT" "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}" \
            "chmod +x '${{ secrets.VM_APP_DIR }}/deploy.sh' && APP_DIR='${{ secrets.VM_APP_DIR }}' '${{ secrets.VM_APP_DIR }}/deploy.sh'"
