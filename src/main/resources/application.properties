spring.application.name=rewards-ledger
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/rewards}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:rewards}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:rewards}}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

api.key=${API_KEY:dev-api-key}
app.version=${APP_VERSION:0.0.1}
auth.jwt.secret=${AUTH_JWT_SECRET:dev-unsafe-secret-change-me-32-bytes-minimum}
auth.jwt.access-token-minutes=${AUTH_JWT_ACCESS_MINUTES:15}
auth.jwt.refresh-token-days=${AUTH_JWT_REFRESH_DAYS:7}
rate.limit.login.per-minute=${RATE_LIMIT_LOGIN_PER_MINUTE:8}
rate.limit.register.per-minute=${RATE_LIMIT_REGISTER_PER_MINUTE:8}
rate.limit.refresh.per-minute=${RATE_LIMIT_REFRESH_PER_MINUTE:30}
rate.limit.write.per-minute=${RATE_LIMIT_WRITE_PER_MINUTE:120}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n
